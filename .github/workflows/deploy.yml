name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site content
        uses: actions/checkout@v4

      - name: Checkout thebit generator
        uses: actions/checkout@v4
        with:
          repository: abaduser/thebit
          path: .thebit

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Install fd
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find
          sudo ln -s "$(command -v fdfind)" /usr/local/bin/fd

      - name: Build with thebit
        run: env LUA_PATH="./.thebit/?.lua;;" lua ./.thebit/thebit.lua

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outbox

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
